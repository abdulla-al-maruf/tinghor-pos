<!DOCTYPE html>
<html>
<head>
    <title>LocalStorage Validation Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 3px; overflow: auto; }
    </style>
</head>
<body>
    <h1>LocalStorage Validation Test</h1>
    
    <div class="test">
        <h3>Test 1: Valid Cart Data</h3>
        <button onclick="testValidData()">Test Valid Data</button>
        <div id="result1"></div>
    </div>
    
    <div class="test">
        <h3>Test 2: Invalid Cart Data (Malformed JSON)</h3>
        <button onclick="testInvalidJSON()">Test Invalid JSON</button>
        <div id="result2"></div>
    </div>
    
    <div class="test">
        <h3>Test 3: Invalid Cart Data (Wrong Schema)</h3>
        <button onclick="testWrongSchema()">Test Wrong Schema</button>
        <div id="result3"></div>
    </div>
    
    <div class="test">
        <h3>Test 4: Clear All Test Data</h3>
        <button onclick="clearTestData()">Clear Test Data</button>
        <div id="result4"></div>
    </div>
    
    <script>
        // Simulated validation function (simplified version)
        function validateCart(data) {
            try {
                if (!Array.isArray(data)) {
                    throw new Error('Data must be an array');
                }
                
                // Basic validation of cart items
                for (const item of data) {
                    if (!item.groupId || typeof item.groupId !== 'string') {
                        throw new Error('Invalid groupId');
                    }
                    if (!item.variantId || typeof item.variantId !== 'string') {
                        throw new Error('Invalid variantId');
                    }
                    if (typeof item.quantityPieces !== 'number' || item.quantityPieces <= 0) {
                        throw new Error('Invalid quantityPieces');
                    }
                }
                
                return { success: true, data: data };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }
        
        function parseLocalStorageCart(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return { success: true, data: [] };
                
                const parsed = JSON.parse(raw);
                const result = validateCart(parsed);
                
                if (result.success) {
                    return result;
                } else {
                    console.warn(`Invalid cart data in localStorage key "${key}":`, result.error);
                    localStorage.removeItem(key);
                    return { success: true, data: [] };
                }
            } catch (error) {
                console.error(`Error parsing localStorage key "${key}":`, error);
                localStorage.removeItem(key);
                return { success: true, data: [] };
            }
        }
        
        function showResult(elementId, message, isSuccess) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<pre>${message}</pre>`;
            element.className = isSuccess ? 'success' : 'error';
        }
        
        function testValidData() {
            const validCart = [
                {
                    groupId: "group1",
                    variantId: "variant1",
                    name: "Test Product",
                    lengthFeet: 6,
                    quantityPieces: 10,
                    formattedQty: "10 pcs",
                    priceUnit: 100,
                    buyPriceUnit: 80,
                    subtotal: 1000,
                    unitType: "piece"
                }
            ];
            
            localStorage.setItem('pos_draft_cart', JSON.stringify(validCart));
            const result = parseLocalStorageCart('pos_draft_cart');
            
            showResult('result1', 
                `Stored valid data: ${JSON.stringify(validCart, null, 2)}\n\n` +
                `Parsed result: ${JSON.stringify(result, null, 2)}`,
                result.success
            );
        }
        
        function testInvalidJSON() {
            // Store invalid JSON
            localStorage.setItem('pos_draft_cart', '{invalid json');
            const result = parseLocalStorageCart('pos_draft_cart');
            
            showResult('result2',
                `Stored invalid JSON: {invalid json}\n\n` +
                `Parsed result: ${JSON.stringify(result, null, 2)}\n\n` +
                `Note: localStorage key should be automatically cleared.`,
                result.success && result.data.length === 0
            );
        }
        
        function testWrongSchema() {
            const invalidCart = [
                {
                    wrongField: "test", // Missing required fields
                    anotherField: 123
                }
            ];
            
            localStorage.setItem('pos_draft_cart', JSON.stringify(invalidCart));
            const result = parseLocalStorageCart('pos_draft_cart');
            
            showResult('result3',
                `Stored invalid schema data: ${JSON.stringify(invalidCart, null, 2)}\n\n` +
                `Parsed result: ${JSON.stringify(result, null, 2)}\n\n` +
                `Note: Should return empty array and clear localStorage.`,
                result.success && result.data.length === 0
            );
        }
        
        function clearTestData() {
            localStorage.removeItem('pos_draft_cart');
            showResult('result4',
                'All test data cleared from localStorage.',
                true
            );
        }
    </script>
</body>
</html>
