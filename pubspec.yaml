
name: tinghor_flutter
description: Premium Inventory and POS management system for Tinghor.com
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.1
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  lucide_icons: ^1.0.0 # Using Lucide icons to match React app
  uuid: ^4.3.3
  
  # Charts
  fl_chart: ^0.66.0
  
  # Storage (Local for now, scalable to Hive/Firebase)
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
